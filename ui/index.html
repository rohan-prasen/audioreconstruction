<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>AudioReconstruction</title>
        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"
        ></script>
        <style>
            :root {
                --bg: oklch(92.8% 0.012 78);
                --surface: oklch(97.2% 0.006 82);
                --fg: oklch(19% 0.018 66);
                --muted: oklch(43% 0.014 72);
                --border: oklch(81.5% 0.014 78);
                --accent: oklch(57% 0.125 58);

                --font-display: "Iowan Old Style", "Charter", Georgia, serif;
                --font-body:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                    sans-serif;

                --primary: #000000;
                --secondary: #111111;
                --success: oklch(67% 0.13 72);
                --warning: #d97706;
                --danger: #dc2626;
                --radius-lg: 28px;
                --radius-md: 18px;
                --shadow-soft: 0 26px 90px rgb(82 58 30 / 0.18);
                --glass: color-mix(in oklch, var(--surface) 74%, transparent);
                color-scheme: light;
            }

            [data-theme="dark"] {
                --bg: oklch(12% 0.018 58);
                --surface: oklch(18% 0.02 56);
                --fg: oklch(96% 0.009 82);
                --muted: oklch(74% 0.026 76);
                --border: oklch(34% 0.032 62);
                --accent: oklch(70% 0.13 68);
                --primary: #ffffff;
                --secondary: #f5f5f5;
                --glass: color-mix(in oklch, var(--surface) 58%, transparent);
                --shadow-soft: 0 28px 90px rgb(0 0 0 / 0.34);
                color-scheme: dark;
            }

            * {
                box-sizing: border-box;
            }
            html {
                min-width: 320px;
                background: var(--bg);
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family: var(--font-body);
                background:
                    radial-gradient(
                        circle at 50% -12%,
                        color-mix(in oklch, var(--accent) 24%, transparent),
                        transparent 36rem
                    ),
                    radial-gradient(
                        circle at 10% 24%,
                        oklch(83% 0.048 74 / 0.34),
                        transparent 28rem
                    ),
                    linear-gradient(
                        180deg,
                        oklch(96% 0.01 82),
                        var(--bg) 42%,
                        oklch(90% 0.012 74)
                    ),
                    var(--bg);
                color: var(--fg);
                text-rendering: optimizeLegibility;
                -webkit-font-smoothing: antialiased;
            }

            [data-theme="dark"] body {
                background:
                    radial-gradient(
                        circle at 50% 0%,
                        color-mix(in oklch, var(--accent) 14%, transparent),
                        transparent 38rem
                    ),
                    var(--bg);
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                opacity: 0.075;
                background-image:
                    linear-gradient(90deg, var(--fg) 1px, transparent 1px),
                    linear-gradient(var(--fg) 1px, transparent 1px);
                background-size: 48px 48px;
                mask-image: linear-gradient(to bottom, black, transparent 70%);
                z-index: 0;
            }

            button,
            input {
                font: inherit;
            }
            button {
                border: 0;
                cursor: pointer;
            }
            button:disabled {
                cursor: not-allowed;
            }
            a {
                color: inherit;
            }

            .app {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                overflow-x: clip;
            }

            .navbar {
                position: fixed;
                z-index: 20;
                top: clamp(12px, 2vw, 24px);
                left: 50%;
                width: min(calc(100% - clamp(24px, 6vw, 72px)), 820px);
                display: flex;
                align-items: center;
                gap: 12px;
                min-height: 54px;
                padding: 7px 8px 7px 10px;
                border: 1px solid
                    color-mix(in oklch, var(--border) 88%, var(--accent) 8%);
                border-radius: 999px;
                background:
                    linear-gradient(
                        135deg,
                        color-mix(in oklch, var(--surface) 86%, transparent),
                        color-mix(in oklch, var(--surface) 58%, transparent)
                    ),
                    color-mix(in oklch, var(--glass) 88%, transparent);
                backdrop-filter: blur(22px) saturate(1.22);
                box-shadow:
                    0 18px 58px rgb(82 58 30 / 0.15),
                    inset 0 1px 0 rgb(255 255 255 / 0.42);
                transform: translateX(-50%);
                transition:
                    background 180ms ease,
                    border-color 180ms ease,
                    backdrop-filter 180ms ease,
                    box-shadow 180ms ease;
            }

            .navbar.scrolled {
                background: color-mix(
                    in oklch,
                    var(--surface) 90%,
                    transparent
                );
                border-color: color-mix(
                    in oklch,
                    var(--border) 95%,
                    var(--fg) 5%
                );
                backdrop-filter: blur(26px) saturate(1.35);
                box-shadow:
                    0 14px 44px rgb(82 58 30 / 0.18),
                    inset 0 1px 0 rgb(255 255 255 / 0.48);
            }

            .wordmark {
                display: inline-flex;
                align-items: center;
                gap: 9px;
                min-width: 0;
                min-height: 40px;
                padding: 0 13px 0 7px;
                border-radius: 999px;
                font-family: var(--font-display);
                font-size: 19px;
                font-weight: 700;
                letter-spacing: -0.035em;
                line-height: 1;
                text-decoration: none;
                white-space: nowrap;
                transition:
                    transform 160ms ease,
                    background 160ms ease,
                    color 160ms ease;
            }

            .wordmark:hover,
            .wordmark:focus-visible {
                background: color-mix(
                    in oklch,
                    var(--surface) 52%,
                    var(--fg) 7%
                );
                transform: translateY(-1px);
                outline: none;
            }

            .wordmark-dot {
                position: relative;
                width: 28px;
                height: 28px;
                border-radius: 999px;
                background:
                    radial-gradient(
                        circle at 34% 28%,
                        white 0 9%,
                        transparent 10%
                    ),
                    radial-gradient(
                        circle at 60% 62%,
                        color-mix(in oklch, var(--accent) 65%, white) 0 18%,
                        transparent 19%
                    ),
                    linear-gradient(
                        135deg,
                        var(--fg),
                        color-mix(in oklch, var(--fg) 64%, var(--accent))
                    );
                box-shadow:
                    0 0 24px color-mix(in oklch, var(--accent) 45%, transparent),
                    inset 0 1px 0 rgb(255 255 255 / 0.24);
            }

            .wordmark-dot::after {
                content: "";
                position: absolute;
                inset: 8px;
                border: 1.5px solid
                    color-mix(in oklch, var(--bg) 72%, transparent);
                border-left-color: transparent;
                border-bottom-color: transparent;
                border-radius: 999px;
                transform: rotate(-18deg);
            }

            .wordmark-text {
                background: linear-gradient(
                    90deg,
                    var(--fg),
                    color-mix(in oklch, var(--fg) 66%, var(--accent))
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }

            .nav-spacer {
                flex: 1;
            }

            .theme-menu-wrap {
                position: relative;
                display: grid;
                place-items: center;
            }

            .theme-trigger {
                position: relative;
                display: inline-grid;
                place-items: center;
                width: 56px;
                height: 38px;
                border: 1px solid
                    color-mix(in oklch, var(--border) 76%, transparent);
                border-radius: 999px;
                background: color-mix(
                    in oklch,
                    var(--surface) 42%,
                    transparent
                );
                color: var(--fg);
                box-shadow:
                    0 8px 22px rgb(82 58 30 / 0.08),
                    inset 0 1px 0 rgb(255 255 255 / 0.28);
                transition:
                    transform 160ms ease,
                    border-color 160ms ease,
                    background 160ms ease,
                    box-shadow 160ms ease;
            }

            .theme-trigger:hover,
            .theme-trigger:focus-visible,
            .theme-trigger[aria-expanded="true"] {
                transform: translateY(-1px);
                border-color: color-mix(
                    in oklch,
                    var(--accent) 48%,
                    var(--border)
                );
                background: color-mix(
                    in oklch,
                    var(--surface) 72%,
                    transparent
                );
                box-shadow:
                    0 10px 28px
                        color-mix(in oklch, var(--accent) 16%, transparent),
                    inset 0 1px 0 rgb(255 255 255 / 0.34);
                outline: none;
            }

            .theme-menu {
                position: absolute;
                top: calc(100% + 12px);
                right: 0;
                display: grid;
                gap: 4px;
                width: 196px;
                padding: 10px;
                border: 1px solid
                    color-mix(in oklch, var(--border) 86%, transparent);
                border-radius: 20px;
                background: linear-gradient(
                    145deg,
                    color-mix(in oklch, var(--surface) 96%, transparent),
                    color-mix(in oklch, var(--surface) 82%, transparent)
                );
                backdrop-filter: blur(24px) saturate(1.18);
                box-shadow:
                    0 22px 60px rgb(82 58 30 / 0.18),
                    inset 0 1px 0 rgb(255 255 255 / 0.36);
                opacity: 0;
                transform: translateY(-8px) scale(0.96);
                transform-origin: top right;
                pointer-events: none;
                transition:
                    opacity 180ms ease,
                    transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            .theme-menu.open {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }

            .theme-option {
                display: flex;
                align-items: center;
                gap: 12px;
                width: 100%;
                min-height: 46px;
                padding: 0 14px;
                border-radius: 14px;
                background: transparent;
                color: var(--muted);
                font-family:
                    "Optima", "Avenir Next", "Gill Sans", var(--font-body);
                font-size: 14.5px;
                font-weight: 400;
                text-align: left;
                letter-spacing: 0;
                transition:
                    background 150ms ease,
                    color 150ms ease,
                    transform 150ms ease,
                    box-shadow 150ms ease;
            }

            .theme-option:hover,
            .theme-option:focus-visible {
                background: color-mix(
                    in oklch,
                    var(--surface) 58%,
                    var(--fg) 7%
                );
                color: var(--fg);
                transform: translateX(1px);
                outline: none;
            }

            .theme-option[aria-checked="true"] {
                background: color-mix(
                    in oklch,
                    var(--accent) 14%,
                    var(--surface)
                );
                color: var(--fg);
                box-shadow: inset 0 0 0 1px
                    color-mix(in oklch, var(--accent) 22%, transparent);
            }

            .theme-option svg,
            .theme-trigger svg {
                width: 17px;
                height: 17px;
                flex: 0 0 auto;
            }

            .theme-mobile-icon {
                display: none;
            }

            .github-link {
                position: relative;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                height: 40px;
                padding: 0 13px 0 15px;
                border: 1px solid
                    color-mix(in oklch, var(--border) 70%, transparent);
                border-radius: 999px;
                background: color-mix(
                    in oklch,
                    var(--surface) 36%,
                    transparent
                );
                font-family:
                    "Optima", "Avenir Next", "Gill Sans", var(--font-body);
                font-size: 14px;
                font-weight: 400;
                letter-spacing: 0.01em;
                text-decoration: none;
                transition:
                    transform 160ms ease,
                    border-color 160ms ease,
                    background 160ms ease;
            }

            .github-link::after {
                content: "\2197";
                position: absolute;
                right: -2px;
                top: -4px;
                width: 17px;
                height: 17px;
                display: grid;
                place-items: center;
                border-radius: 999px;
                background: var(--accent);
                color: white;
                font-size: 10px;
                opacity: 0;
                transform: translate(-2px, 2px) scale(0.88);
                transition:
                    opacity 150ms ease,
                    transform 150ms ease;
            }

            .github-link:hover,
            .github-link:focus-visible {
                transform: translateY(-1px);
                border-color: color-mix(
                    in oklch,
                    var(--accent) 55%,
                    var(--border)
                );
                background: color-mix(
                    in oklch,
                    var(--surface) 70%,
                    transparent
                );
                outline: none;
            }

            .github-link:hover::after,
            .github-link:focus-visible::after {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }

            .hero {
                position: relative;
                display: grid;
                place-items: start center;
                min-height: 100svh;
                padding: clamp(116px, 16vh, 170px) 20px 34px;
            }

            .mesh-stage {
                position: absolute;
                z-index: -1;
                inset: 0 0 auto;
                height: clamp(360px, 48svh, 520px);
                overflow: hidden;
                pointer-events: none;
                mask-image: linear-gradient(
                    to bottom,
                    black 0%,
                    black 66%,
                    transparent 100%
                );
            }

            .mesh-stage::after {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(
                    ellipse at center,
                    transparent 20%,
                    var(--bg) 76%
                );
            }

            .blob {
                position: absolute;
                width: clamp(280px, 38vw, 720px);
                aspect-ratio: 1;
                border-radius: 999px;
                filter: blur(54px);
                opacity: 0.72;
                mix-blend-mode: screen;
                transform: translate3d(0, 0, 0);
                will-change: transform;
            }

            [data-theme="light"] .blob {
                mix-blend-mode: multiply;
                opacity: 0.48;
                filter: blur(60px) saturate(1.12);
            }

            .blob-a {
                left: 10%;
                top: 8%;
                background: radial-gradient(
                    circle,
                    oklch(68% 0.15 36),
                    transparent 68%
                );
                animation: orbitA 16s ease-in-out infinite alternate;
            }

            .blob-b {
                right: 11%;
                top: 2%;
                background: radial-gradient(
                    circle,
                    oklch(73% 0.12 62),
                    transparent 69%
                );
                animation: orbitB 18s ease-in-out infinite alternate;
            }

            .blob-c {
                left: 34%;
                top: 18%;
                background: radial-gradient(
                    circle,
                    oklch(82% 0.07 82),
                    transparent 70%
                );
                animation: orbitC 20s ease-in-out infinite alternate;
            }

            .blob-d {
                right: 28%;
                top: 28%;
                width: clamp(210px, 28vw, 500px);
                background: radial-gradient(
                    circle,
                    oklch(77% 0.1 52),
                    transparent 72%
                );
                animation: orbitD 14s ease-in-out infinite alternate;
            }

            @keyframes orbitA {
                to {
                    transform: translate3d(7vw, 7vh, 0) scale(1.12);
                }
            }
            @keyframes orbitB {
                to {
                    transform: translate3d(-8vw, 9vh, 0) scale(0.96);
                }
            }
            @keyframes orbitC {
                to {
                    transform: translate3d(3vw, -7vh, 0) scale(1.15);
                }
            }
            @keyframes orbitD {
                to {
                    transform: translate3d(-5vw, -4vh, 0) scale(1.22);
                }
            }

            .hero-inner {
                width: min(100%, 940px);
                display: grid;
                justify-items: center;
            }

            .headline-wrap {
                position: relative;
                display: grid;
                justify-items: center;
                width: min(100%, 880px);
                margin-bottom: clamp(34px, 6vh, 56px);
                text-align: center;
            }

            .headline-wrap::before {
                content: "";
                position: absolute;
                inset: -50px -44px -26px;
                z-index: -1;
                background: radial-gradient(
                    ellipse at center,
                    color-mix(in oklch, var(--bg) 72%, transparent),
                    transparent 70%
                );
                filter: blur(10px);
            }

            h1 {
                max-width: 850px;
                margin: 0;
                font-family: var(--font-display);
                font-size: clamp(48px, 9vw, 116px);
                line-height: 0.92;
                letter-spacing: -0.04em;
                text-wrap: balance;
            }

            .subhead {
                max-width: 620px;
                margin: 26px 0 0;
                color: color-mix(in oklch, var(--fg) 72%, var(--accent));
                font-family:
                    "Avenir Next",
                    "Segoe UI",
                    -apple-system,
                    BlinkMacSystemFont,
                    system-ui,
                    sans-serif;
                font-size: clamp(18px, 2.15vw, 24px);
                font-style: italic;
                font-weight: 500;
                line-height: 1.45;
                letter-spacing: 0;
                text-wrap: pretty;
            }

            .subhead-emphasis {
                display: inline-block;
                color: var(--accent);
                font-weight: 800;
                font-style: normal;
                letter-spacing: -0.015em;
                text-shadow: 0 0 22px
                    color-mix(in oklch, var(--accent) 36%, transparent);
                transform: translateY(1px);
            }

            .dropzone-shell {
                width: min(100%, 540px);
                display: grid;
                gap: 10px;
            }

            .dropzone {
                position: relative;
                overflow: hidden;
                display: grid;
                gap: 18px;
                min-height: 0;
                padding: clamp(18px, 4vw, 24px);
                border: 1px solid
                    color-mix(in oklch, var(--border) 92%, var(--fg) 4%);
                border-radius: 24px;
                background:
                    linear-gradient(
                        180deg,
                        color-mix(in oklch, var(--surface) 88%, transparent),
                        color-mix(in oklch, var(--surface) 72%, transparent)
                    ),
                    color-mix(in oklch, var(--surface) 66%, transparent);
                box-shadow:
                    0 18px 52px rgb(82 58 30 / 0.13),
                    inset 0 1px 0 rgb(255 255 255 / 0.44);
                backdrop-filter: blur(22px) saturate(1.1);
                text-align: left;
                font-family:
                    Optima, "Avenir Next", "Gill Sans", "Segoe UI", system-ui,
                    sans-serif;
                transition:
                    transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    border-color 180ms ease,
                    opacity 180ms ease,
                    box-shadow 180ms ease,
                    background 180ms ease;
            }

            .dropzone::before {
                content: none;
            }

            .dropzone::after {
                content: "";
                position: absolute;
                right: -46px;
                top: -58px;
                width: 180px;
                height: 180px;
                border-radius: 999px;
                background: radial-gradient(
                    circle,
                    color-mix(in oklch, var(--accent) 16%, transparent),
                    transparent 66%
                );
                filter: blur(10px);
                opacity: 0.7;
                pointer-events: none;
            }

            .dropzone:not(.disabled):hover,
            .dropzone.hovered {
                border-color: color-mix(
                    in oklch,
                    var(--accent) 32%,
                    var(--border)
                );
                box-shadow:
                    0 20px 58px
                        color-mix(in oklch, var(--accent) 10%, transparent),
                    0 16px 48px rgb(82 58 30 / 0.13);
            }

            .dropzone.drag-accept,
            .dropzone.drag-reject {
                transform: scale(1.02);
                border-color: var(--accent);
                box-shadow:
                    0 0 0 8px
                        color-mix(in oklch, var(--accent) 16%, transparent),
                    var(--shadow-soft);
            }

            .dropzone.drag-reject {
                border-color: var(--danger);
                box-shadow:
                    0 0 0 8px rgb(220 38 38 / 0.12),
                    var(--shadow-soft);
            }

            .dropzone.disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .dropzone input {
                display: none;
            }

            .upload-head {
                position: relative;
                z-index: 1;
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 18px;
            }

            .upload-title {
                display: block;
                margin: 0;
                font-family: "Iowan Old Style", "Charter", Georgia, serif;
                font-size: 19px;
                font-weight: 500;
                letter-spacing: -0.006em;
                line-height: 1.12;
            }

            .upload-caption {
                display: block;
                margin: 5px 0 0;
                color: var(--muted);
                font-size: 13.5px;
                font-weight: 400;
                line-height: 1.45;
                letter-spacing: 0.005em;
            }

            .upload-badge {
                display: inline-flex;
                align-items: center;
                min-height: 28px;
                padding: 0 10px;
                border: 1px solid
                    color-mix(in oklch, var(--border) 80%, transparent);
                border-radius: 999px;
                background: color-mix(
                    in oklch,
                    var(--surface) 64%,
                    transparent
                );
                color: color-mix(in oklch, var(--fg) 78%, var(--muted));
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.07em;
                text-transform: uppercase;
                white-space: nowrap;
            }

            .upload-well {
                position: relative;
                z-index: 1;
                display: flex;
                align-items: center;
                gap: 15px;
                min-height: 116px;
                padding: 23px 24px;
                border: 1px dashed
                    color-mix(in oklch, var(--border) 76%, var(--fg) 10%);
                border-radius: 17px;
                background: color-mix(in oklch, var(--bg) 48%, transparent);
                transition:
                    border-color 180ms ease,
                    background 180ms ease,
                    transform 180ms ease;
            }

            .dropzone:not(.disabled):hover .upload-well,
            .dropzone.hovered .upload-well {
                border-color: color-mix(
                    in oklch,
                    var(--accent) 56%,
                    var(--border)
                );
                background: color-mix(
                    in oklch,
                    var(--surface) 62%,
                    transparent
                );
            }

            .dropzone.drag-accept .upload-well {
                border-style: solid;
                border-color: var(--accent);
                background: color-mix(
                    in oklch,
                    var(--accent) 9%,
                    var(--surface)
                );
            }

            .dropzone.drag-reject .upload-well {
                border-style: solid;
                border-color: var(--danger);
                background: color-mix(
                    in oklch,
                    var(--danger) 8%,
                    var(--surface)
                );
            }

            .upload-icon {
                position: relative;
                z-index: 1;
                width: 44px;
                height: 44px;
                flex: 0 0 auto;
                display: grid;
                place-items: center;
                border: 1px solid
                    color-mix(in oklch, var(--border) 70%, transparent);
                border-radius: 13px;
                color: var(--fg);
                background: color-mix(
                    in oklch,
                    var(--surface) 76%,
                    var(--accent) 8%
                );
                box-shadow:
                    0 10px 24px
                        color-mix(in oklch, var(--accent) 10%, transparent),
                    inset 0 1px 0 rgb(255 255 255 / 0.22);
            }

            .upload-copy {
                min-width: 0;
                display: grid;
                gap: 3px;
            }

            .drop-primary {
                position: relative;
                z-index: 1;
                font-size: 15.5px;
                font-weight: 500;
                letter-spacing: 0.002em;
            }

            .drop-secondary {
                position: relative;
                z-index: 1;
                color: var(--muted);
                font-size: 13.5px;
                font-weight: 400;
            }

            .drop-tertiary {
                position: relative;
                z-index: 1;
                color: color-mix(in oklch, var(--muted) 84%, var(--fg));
                font-size: 12.5px;
                font-weight: 400;
            }

            .upload-meta {
                position: relative;
                z-index: 1;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 14px;
                color: var(--muted);
                font-size: 12px;
                font-weight: 400;
                line-height: 1.4;
            }

            .upload-meta strong {
                color: color-mix(in oklch, var(--fg) 82%, var(--muted));
                font-weight: 500;
            }

            .upload-format {
                color: color-mix(in oklch, var(--accent) 84%, var(--fg));
                font-weight: 500;
                letter-spacing: 0.07em;
                text-transform: uppercase;
                white-space: nowrap;
            }

            .inline-message {
                min-height: 20px;
                color: var(--danger);
                font-size: 13px;
                line-height: 1.45;
            }

            .queue {
                width: min(100%, 640px);
                display: grid;
                gap: 12px;
                margin-top: 20px;
            }

            .file-card {
                position: relative;
                overflow: hidden;
                display: grid;
                gap: 14px;
                padding: 17px 18px 16px;
                border: 1px solid
                    color-mix(in oklch, var(--border) 88%, transparent);
                border-radius: var(--radius-md);
                background: color-mix(
                    in oklch,
                    var(--surface) 80%,
                    transparent
                );
                backdrop-filter: blur(18px) saturate(1.12);
                box-shadow: 0 18px 54px rgb(82 58 30 / 0.13);
                animation: cardIn 260ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
            }

            @keyframes cardIn {
                from {
                    opacity: 0;
                    transform: translateY(-12px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            .file-card.done {
                border-color: color-mix(
                    in oklch,
                    var(--success) 34%,
                    var(--border)
                );
                background: color-mix(
                    in oklch,
                    var(--surface) 74%,
                    var(--success) 4%
                );
            }

            .file-card.failed {
                border-color: color-mix(
                    in oklch,
                    var(--danger) 50%,
                    var(--border)
                );
            }

            .file-card.cancelled {
                opacity: 0.62;
            }

            .file-top {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                align-items: center;
                gap: 14px;
            }

            .filename {
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
                font-weight: 650;
                letter-spacing: -0.01em;
            }

            .uploading .filename,
            .processing .filename {
                animation: subtlePulse 1.6s ease-in-out infinite;
            }

            @keyframes subtlePulse {
                50% {
                    opacity: 0.62;
                }
            }

            .file-actions {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 8px;
            }

            .status {
                min-width: 70px;
                color: var(--muted);
                font-size: 13px;
                font-weight: 650;
                text-align: right;
                transition: opacity 150ms ease;
            }

            .mini-action,
            .remove-btn {
                min-height: 34px;
                border-radius: 999px;
                transition:
                    transform 150ms ease,
                    background 150ms ease,
                    color 150ms ease,
                    opacity 150ms ease;
            }

            .mini-action {
                padding: 0 13px;
                background: var(--fg);
                color: var(--bg);
                font-size: 13px;
                font-weight: 700;
            }

            .mini-action.secondary {
                background: color-mix(
                    in oklch,
                    var(--surface) 70%,
                    var(--fg) 7%
                );
                color: var(--fg);
            }

            .remove-btn {
                width: 34px;
                background: transparent;
                color: var(--muted);
                font-size: 20px;
                line-height: 1;
            }

            .mini-action:hover,
            .remove-btn:hover {
                transform: scale(1.05);
            }

            .remove-btn:hover {
                background: color-mix(
                    in oklch,
                    var(--surface) 62%,
                    var(--fg) 8%
                );
                color: var(--fg);
            }

            .error-line {
                color: var(--danger);
                font-size: 13px;
                line-height: 1.45;
            }

            .progress-track {
                position: relative;
                overflow: hidden;
                height: 3px;
                border-radius: 999px;
                background: color-mix(in oklch, var(--border) 70%, transparent);
            }

            .progress-fill {
                position: absolute;
                inset: 0 auto 0 0;
                width: var(--progress);
                border-radius: inherit;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    color-mix(in oklch, var(--accent) 45%, white)
                );
                transition: width 220ms ease;
            }

            .processing .progress-fill {
                width: 42%;
                background:
                    linear-gradient(
                        110deg,
                        transparent 0 25%,
                        rgb(255 255 255 / 0.45) 42%,
                        transparent 58% 100%
                    ),
                    linear-gradient(
                        90deg,
                        color-mix(in oklch, var(--accent) 62%, transparent),
                        var(--accent)
                    );
                animation: shimmer 1.15s linear infinite;
            }

            @keyframes shimmer {
                from {
                    transform: translateX(-120%);
                }
                to {
                    transform: translateX(250%);
                }
            }

            .start-wrap {
                display: grid;
                justify-items: center;
                margin-top: 24px;
            }

            .start-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                min-height: 56px;
                padding: 0 30px;
                border-radius: 999px;
                background: var(--fg);
                color: var(--bg);
                box-shadow: 0 18px 46px
                    color-mix(in oklch, var(--fg) 18%, transparent);
                font-size: 16px;
                font-weight: 750;
                letter-spacing: -0.01em;
                transition:
                    transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    filter 160ms ease,
                    box-shadow 160ms ease;
            }

            .start-button:not(:disabled):hover {
                transform: scale(1.02);
                filter: brightness(1.04);
            }

            .start-button:disabled {
                background: color-mix(
                    in oklch,
                    var(--muted) 42%,
                    var(--surface)
                );
                color: color-mix(in oklch, var(--fg) 72%, var(--muted));
                box-shadow: none;
            }

            .spinner {
                width: 16px;
                height: 16px;
                border-radius: 999px;
                border: 2px solid currentColor;
                border-top-color: transparent;
                animation: spin 800ms linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @media (max-width: 700px) {
                .navbar {
                    width: min(calc(100% - 20px), 620px);
                    min-height: 52px;
                    padding: 7px 8px;
                    gap: 8px;
                }

                .wordmark {
                    font-size: 17px;
                    padding-right: 9px;
                }
                .wordmark-dot {
                    width: 26px;
                    height: 26px;
                }
                .wordmark-text {
                    max-width: 168px;
                    overflow: hidden;
                    text-overflow: ellipsis;
                }
                .theme-trigger {
                    width: 52px;
                    height: 38px;
                }
                .theme-menu {
                    right: -16px;
                    width: 186px;
                    padding: 9px;
                }
                .github-link {
                    height: 38px;
                    padding: 0 12px;
                    font-size: 13px;
                }
                .hero {
                    padding-top: 106px;
                }
                .headline-wrap {
                    margin-bottom: 28px;
                }
                h1 {
                    font-size: clamp(43px, 13.5vw, 64px);
                }
                .subhead {
                    font-size: 16px;
                }
                .dropzone {
                    border-radius: 22px;
                    padding: 17px;
                }
                .upload-head {
                    gap: 12px;
                }
                .upload-well {
                    align-items: flex-start;
                    padding: 20px;
                }
                .upload-meta {
                    align-items: flex-start;
                    flex-direction: column;
                    gap: 5px;
                }
                .file-top {
                    grid-template-columns: 1fr;
                    gap: 9px;
                }
                .file-actions {
                    justify-content: space-between;
                }
                .status {
                    min-width: 0;
                    text-align: left;
                }
            }

            @media (max-width: 430px) {
                .navbar {
                    width: calc(100% - 18px);
                }
                .wordmark {
                    gap: 7px;
                    padding-left: 6px;
                    padding-right: 7px;
                }
                .wordmark-text {
                    max-width: 118px;
                }
                .theme-desktop-icon {
                    display: none;
                }
                .theme-mobile-icon {
                    display: block;
                }
                .github-link span {
                    display: none;
                }
                .github-link {
                    width: 38px;
                    padding: 0;
                }
                .theme-trigger {
                    width: 50px;
                }
                .theme-menu {
                    right: -42px;
                    width: 176px;
                }
                .dropzone-shell,
                .queue {
                    width: 100%;
                }
                .upload-head {
                    flex-direction: column;
                }
                .upload-badge {
                    align-self: flex-start;
                }
                .upload-well {
                    gap: 12px;
                    padding: 18px;
                }
                .upload-icon {
                    width: 40px;
                    height: 40px;
                    border-radius: 12px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation-duration: 0.001ms !important;
                    animation-iteration-count: 1 !important;
                    scroll-behavior: auto !important;
                    transition-duration: 0.001ms !important;
                }
                .blob {
                    transform: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="text/babel">
            const { useEffect, useMemo, useRef, useState } = React;

            const MAX_FILES = 3;
            const MAX_SIZE = 25 * 1024 * 1024;
            const MAX_DURATION = 6 * 60;
            const ERROR_COPY = {
                type: "MP3 only \u2014 that file isn't supported.",
                size: "That file is over 25 MB. Try a smaller one.",
                duration:
                    "That file is longer than 6 minutes. Try a shorter clip.",
                full: "Queue is full. Remove a file to add another.",
                network: "Connection lost. Tap retry when you're back online.",
                busy: "Slow down a moment \u2014 too many requests. Try again in a minute.",
                timeout:
                    "That took too long. The file might be too complex \u2014 try a shorter clip.",
            };

            function SunIcon(props) {
                return (
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="1.8"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        aria-hidden="true"
                        {...props}
                    >
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2.5v2.2M12 19.3v2.2M4.57 4.57l1.56 1.56M17.87 17.87l1.56 1.56M2.5 12h2.2M19.3 12h2.2M4.57 19.43l1.56-1.56M17.87 6.13l1.56-1.56"></path>
                    </svg>
                );
            }

            function MoonIcon(props) {
                return (
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="1.8"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        aria-hidden="true"
                        {...props}
                    >
                        <path d="M20.5 14.4A7.9 7.9 0 0 1 9.6 3.5a8.7 8.7 0 1 0 10.9 10.9Z"></path>
                    </svg>
                );
            }

            function DesktopIcon(props) {
                return (
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="1.8"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        aria-hidden="true"
                        {...props}
                    >
                        <rect
                            x="3.5"
                            y="4.5"
                            width="17"
                            height="11.5"
                            rx="2.2"
                        ></rect>
                        <path d="M9 20h6M12 16v4"></path>
                    </svg>
                );
            }

            function MobileIcon(props) {
                return (
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="1.8"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        aria-hidden="true"
                        {...props}
                    >
                        <rect
                            x="7"
                            y="2.75"
                            width="10"
                            height="18.5"
                            rx="2.4"
                        ></rect>
                        <path d="M11 18h2"></path>
                    </svg>
                );
            }

            function App() {
                const [themeChoice, setThemeChoice] = useState(
                    () => localStorage.getItem("audio-theme") || "system",
                );
                const [themeMenuOpen, setThemeMenuOpen] = useState(false);
                const [systemDark, setSystemDark] = useState(
                    () =>
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches,
                );
                const [scrolled, setScrolled] = useState(false);
                const [dragState, setDragState] = useState("idle");
                const [message, setMessage] = useState("");
                const [items, setItems] = useState([]);
                const inputRef = useRef(null);
                const themeMenuRef = useRef(null);
                const timers = useRef(new Map());

                const activeTheme =
                    themeChoice === "system"
                        ? systemDark
                            ? "dark"
                            : "light"
                        : themeChoice;
                const queueFull = items.length >= MAX_FILES;
                const hasReady = items.some((item) => item.status === "Ready");
                const allWorking =
                    items.length > 0 &&
                    items.every(
                        (item) =>
                            item.status === "Uploading" ||
                            item.status === "Processing",
                    );
                const showStart =
                    items.length > 0 &&
                    (hasReady ||
                        allWorking ||
                        items.some(
                            (item) =>
                                item.status === "Uploading" ||
                                item.status === "Processing",
                        ));
                const startDisabled = allWorking || !hasReady;

                useEffect(() => {
                    document.documentElement.dataset.theme = activeTheme;
                    localStorage.setItem("audio-theme", themeChoice);
                }, [activeTheme, themeChoice]);

                useEffect(() => {
                    const media = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    );
                    const onMedia = (event) => setSystemDark(event.matches);
                    media.addEventListener("change", onMedia);
                    return () => media.removeEventListener("change", onMedia);
                }, []);

                useEffect(() => {
                    const onScroll = () => setScrolled(window.scrollY > 8);
                    onScroll();
                    window.addEventListener("scroll", onScroll, {
                        passive: true,
                    });
                    return () => window.removeEventListener("scroll", onScroll);
                }, []);

                useEffect(() => {
                    if (!themeMenuOpen) return undefined;
                    const onPointer = (event) => {
                        if (
                            themeMenuRef.current &&
                            !themeMenuRef.current.contains(event.target)
                        )
                            setThemeMenuOpen(false);
                    };
                    const onKey = (event) => {
                        if (event.key === "Escape") setThemeMenuOpen(false);
                    };
                    window.addEventListener("pointerdown", onPointer);
                    window.addEventListener("keydown", onKey);
                    return () => {
                        window.removeEventListener("pointerdown", onPointer);
                        window.removeEventListener("keydown", onKey);
                    };
                }, [themeMenuOpen]);

                useEffect(
                    () => () => {
                        timers.current.forEach((handles) =>
                            handles.forEach(window.clearTimeout),
                        );
                        timers.current.clear();
                    },
                    [],
                );

                function flashMessage(text) {
                    setMessage(text);
                    window.clearTimeout(flashMessage.timer);
                    flashMessage.timer = window.setTimeout(
                        () => setMessage(""),
                        4000,
                    );
                }

                function isMp3(file) {
                    return (
                        file.type === "audio/mpeg" || /\.mp3$/i.test(file.name)
                    );
                }

                function getDuration(file) {
                    return new Promise((resolve) => {
                        const audio = document.createElement("audio");
                        const url = URL.createObjectURL(file);
                        audio.preload = "metadata";
                        audio.onloadedmetadata = () => {
                            URL.revokeObjectURL(url);
                            resolve(
                                Number.isFinite(audio.duration)
                                    ? audio.duration
                                    : 0,
                            );
                        };
                        audio.onerror = () => {
                            URL.revokeObjectURL(url);
                            resolve(0);
                        };
                        audio.src = url;
                    });
                }

                async function validateFile(file) {
                    if (!isMp3(file)) return ERROR_COPY.type;
                    if (file.size > MAX_SIZE) return ERROR_COPY.size;
                    const duration = await getDuration(file);
                    if (duration > MAX_DURATION) return ERROR_COPY.duration;
                    return "";
                }

                async function addFiles(fileList) {
                    const files = Array.from(fileList || []);
                    if (!files.length || queueFull) {
                        if (queueFull) flashMessage(ERROR_COPY.full);
                        return;
                    }

                    const slots = MAX_FILES - items.length;
                    const accepted = [];
                    let overflow = files.length > slots;

                    for (const file of files) {
                        if (accepted.length >= slots) break;
                        const error = await validateFile(file);
                        if (error) {
                            flashMessage(error);
                        } else {
                            accepted.push({
                                id: `${file.name}-${file.lastModified}-${crypto.randomUUID()}`,
                                file,
                                name: file.name,
                                status: "Ready",
                                progress: 0,
                                error: "",
                            });
                        }
                    }

                    if (accepted.length)
                        setItems((current) =>
                            [...current, ...accepted].slice(0, MAX_FILES),
                        );
                    if (overflow) flashMessage(ERROR_COPY.full);
                }

                function onDragOver(event) {
                    event.preventDefault();
                    if (queueFull) return setDragState("idle");
                    const files = Array.from(event.dataTransfer.items || []);
                    const hasReject = files.some(
                        (item) =>
                            item.kind === "file" &&
                            item.type &&
                            item.type !== "audio/mpeg",
                    );
                    setDragState(hasReject ? "reject" : "accept");
                }

                function onDrop(event) {
                    event.preventDefault();
                    setDragState("idle");
                    addFiles(event.dataTransfer.files);
                }

                function removeItem(id) {
                    const handles = timers.current.get(id);
                    if (handles) handles.forEach(window.clearTimeout);
                    timers.current.delete(id);
                    setItems((current) =>
                        current.filter((item) => item.id !== id),
                    );
                }

                function cancelItem(id) {
                    const handles = timers.current.get(id);
                    if (handles) handles.forEach(window.clearTimeout);
                    timers.current.delete(id);
                    setItems((current) =>
                        current.map((item) =>
                            item.id === id
                                ? { ...item, status: "Cancelled", progress: 0 }
                                : item,
                        ),
                    );
                    const collapse = window.setTimeout(
                        () => removeItem(id),
                        3000,
                    );
                    timers.current.set(id, [collapse]);
                }

                function retryItem(id) {
                    setItems((current) =>
                        current.map((item) =>
                            item.id === id
                                ? {
                                      ...item,
                                      status: "Ready",
                                      progress: 0,
                                      error: "",
                                  }
                                : item,
                        ),
                    );
                }

                function downloadItem(item) {
                    const stem = item.name.replace(/\.mp3$/i, "");
                    const blob = new Blob(
                        [
                            `AudioReconstruction simulated FLAC export\nSource: ${item.name}\n`,
                        ],
                        { type: "audio/flac" },
                    );
                    const url = URL.createObjectURL(blob);
                    const anchor = document.createElement("a");
                    anchor.href = url;
                    anchor.download = `${stem || "reconstructed"}.flac`;
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    window.setTimeout(() => URL.revokeObjectURL(url), 800);
                }

                function startItem(item) {
                    if (item.status !== "Ready") return;
                    setItems((current) =>
                        current.map((entry) =>
                            entry.id === item.id
                                ? {
                                      ...entry,
                                      status: "Uploading",
                                      progress: 4,
                                      error: "",
                                  }
                                : entry,
                        ),
                    );

                    const uploadA = window.setTimeout(() => {
                        setItems((current) =>
                            current.map((entry) =>
                                entry.id === item.id
                                    ? { ...entry, progress: 12 }
                                    : entry,
                            ),
                        );
                    }, 340);
                    const uploadB = window.setTimeout(() => {
                        setItems((current) =>
                            current.map((entry) =>
                                entry.id === item.id
                                    ? {
                                          ...entry,
                                          progress: 20,
                                          status: "Processing",
                                      }
                                    : entry,
                            ),
                        );
                    }, 950);
                    const finish = window.setTimeout(
                        () => {
                            setItems((current) =>
                                current.map((entry) =>
                                    entry.id === item.id
                                        ? {
                                              ...entry,
                                              status: "Done",
                                              progress: 100,
                                          }
                                        : entry,
                                ),
                            );
                            timers.current.delete(item.id);
                        },
                        3200 + Math.random() * 1200,
                    );

                    timers.current.set(item.id, [uploadA, uploadB, finish]);
                }

                function startReady() {
                    items
                        .filter((item) => item.status === "Ready")
                        .forEach(startItem);
                }

                const dropClass = useMemo(() => {
                    const parts = ["dropzone"];
                    if (dragState === "accept") parts.push("drag-accept");
                    if (dragState === "reject") parts.push("drag-reject");
                    if (queueFull) parts.push("disabled");
                    return parts.join(" ");
                }, [dragState, queueFull]);

                return (
                    <main
                        className="app"
                        onDragOver={onDragOver}
                        onDragLeave={() => setDragState("idle")}
                        onDrop={onDrop}
                    >
                        <nav
                            className={`navbar ${scrolled ? "scrolled" : ""}`}
                            aria-label="Primary"
                        >
                            <a
                                className="wordmark"
                                href="./index.html"
                                aria-label="Open AudioReconstruction home"
                            >
                                <span
                                    className="wordmark-dot"
                                    aria-hidden="true"
                                ></span>
                                <span className="wordmark-text">
                                    AudioReconstruction
                                </span>
                            </a>
                            <div className="nav-spacer"></div>
                            <div className="theme-menu-wrap" ref={themeMenuRef}>
                                <button
                                    className="theme-trigger"
                                    type="button"
                                    aria-label="Theme menu"
                                    aria-haspopup="menu"
                                    aria-expanded={themeMenuOpen}
                                    onClick={() =>
                                        setThemeMenuOpen((open) => !open)
                                    }
                                >
                                    {themeChoice === "light" && <SunIcon />}
                                    {themeChoice === "dark" && <MoonIcon />}
                                    {themeChoice === "system" && (
                                        <React.Fragment>
                                            <DesktopIcon className="theme-desktop-icon" />
                                            <MobileIcon className="theme-mobile-icon" />
                                        </React.Fragment>
                                    )}
                                </button>
                                <div
                                    className={`theme-menu ${themeMenuOpen ? "open" : ""}`}
                                    role="menu"
                                    aria-label="Choose theme"
                                >
                                    {[
                                        ["light", "Light", <SunIcon />],
                                        ["dark", "Dark", <MoonIcon />],
                                        ["system", "System", <DesktopIcon />],
                                    ].map(([value, label, icon]) => (
                                        <button
                                            key={value}
                                            className="theme-option"
                                            type="button"
                                            role="menuitemradio"
                                            aria-checked={themeChoice === value}
                                            onClick={() => {
                                                setThemeChoice(value);
                                                setThemeMenuOpen(false);
                                            }}
                                        >
                                            {icon}
                                            <span>{label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <a
                                className="github-link"
                                href="https://github.com/rohan-prasen/audioreconstruction"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="Star AudioReconstruction on GitHub"
                            >
                                <span>Star</span>
                                <svg
                                    width="19"
                                    height="19"
                                    viewBox="0 0 24 24"
                                    fill="currentColor"
                                    aria-hidden="true"
                                >
                                    <path d="M12 .5A11.5 11.5 0 0 0 8.36 22.9c.58.11.79-.25.79-.56v-2.02c-3.22.7-3.9-1.38-3.9-1.38-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.78 1.2 1.78 1.2 1.04 1.77 2.72 1.26 3.38.96.1-.75.4-1.26.73-1.55-2.57-.29-5.28-1.29-5.28-5.73 0-1.27.45-2.3 1.2-3.12-.12-.29-.52-1.47.11-3.08 0 0 .98-.31 3.2 1.2a11.1 11.1 0 0 1 5.83 0c2.22-1.51 3.2-1.2 3.2-1.2.63 1.61.23 2.79.11 3.08.75.82 1.2 1.85 1.2 3.12 0 4.46-2.71 5.43-5.3 5.72.42.37.79 1.09.79 2.2v3.26c0 .31.21.68.8.56A11.5 11.5 0 0 0 12 .5Z" />
                                </svg>
                            </a>
                        </nav>

                        <section className="hero" aria-labelledby="headline">
                            <div className="mesh-stage" aria-hidden="true">
                                <div className="blob blob-a"></div>
                                <div className="blob blob-b"></div>
                                <div className="blob blob-c"></div>
                                <div className="blob blob-d"></div>
                            </div>

                            <div className="hero-inner">
                                <div className="headline-wrap">
                                    <h1 id="headline">
                                        Restore your lossy music to lossless.
                                    </h1>
                                    <p className="subhead">
                                        Give me old and rusty audio. I will make
                                        them as good as{" "}
                                        <span className="subhead-emphasis">
                                            new
                                        </span>
                                        !
                                    </p>
                                </div>

                                <div className="dropzone-shell">
                                    <label
                                        className={dropClass}
                                        onMouseEnter={() =>
                                            !queueFull &&
                                            setDragState((state) =>
                                                state === "idle"
                                                    ? "hover"
                                                    : state,
                                            )
                                        }
                                        onMouseLeave={() =>
                                            setDragState("idle")
                                        }
                                    >
                                        <input
                                            ref={inputRef}
                                            type="file"
                                            accept="audio/mpeg,.mp3"
                                            multiple
                                            disabled={queueFull}
                                            onChange={(event) => {
                                                addFiles(event.target.files);
                                                event.target.value = "";
                                            }}
                                        />
                                        <span className="upload-head">
                                            <span>
                                                <span className="upload-title">
                                                    Audio upload
                                                </span>
                                                <span className="upload-caption">
                                                    Review your queue before
                                                    reconstruction starts.
                                                </span>
                                            </span>
                                            <span className="upload-badge">
                                                FLAC output
                                            </span>
                                        </span>
                                        <span className="upload-well">
                                            <span
                                                className="upload-icon"
                                                aria-hidden="true"
                                            >
                                                <svg
                                                    width="22"
                                                    height="22"
                                                    viewBox="0 0 24 24"
                                                    fill="none"
                                                    stroke="currentColor"
                                                    strokeWidth="1.8"
                                                    strokeLinecap="round"
                                                    strokeLinejoin="round"
                                                >
                                                    <path d="M12 17V5" />
                                                    <path d="m7 10 5-5 5 5" />
                                                    <path d="M5 19h14" />
                                                </svg>
                                            </span>
                                            <span className="upload-copy">
                                                <span className="drop-primary">
                                                    {queueFull
                                                        ? "Queue full \u2014 remove a file to add more."
                                                        : dragState === "reject"
                                                          ? "MP3 only"
                                                          : "Drag and drop or choose MP3 files"}
                                                </span>
                                                {!queueFull && (
                                                    <span className="drop-secondary">
                                                        Click anywhere in this
                                                        panel to browse.
                                                    </span>
                                                )}
                                                <span className="drop-tertiary">
                                                    Files stay Ready until you
                                                    press Start reconstruction.
                                                </span>
                                            </span>
                                        </span>
                                        <span
                                            className="upload-meta"
                                            aria-label="Upload constraints"
                                        >
                                            <span>
                                                <strong>MP3 only</strong>
                                                {" \u00B7 "}25 MB per file
                                                {" \u00B7 "}6 minutes max
                                                {" \u00B7 "}3 files per queue
                                            </span>
                                            <span className="upload-format">
                                                28M GAN
                                            </span>
                                        </span>
                                    </label>
                                    <div
                                        className="inline-message"
                                        role="status"
                                        aria-live="polite"
                                    >
                                        {message}
                                    </div>
                                </div>

                                {items.length > 0 && (
                                    <section
                                        className="queue"
                                        aria-label="Reconstruction queue"
                                    >
                                        {items.map((item) => (
                                            <FileCard
                                                key={item.id}
                                                item={item}
                                                onRemove={removeItem}
                                                onCancel={cancelItem}
                                                onRetry={retryItem}
                                                onDownload={downloadItem}
                                            />
                                        ))}
                                    </section>
                                )}

                                {showStart && (
                                    <div className="start-wrap">
                                        <button
                                            className="start-button"
                                            type="button"
                                            disabled={startDisabled}
                                            onClick={startReady}
                                        >
                                            {allWorking && (
                                                <span
                                                    className="spinner"
                                                    aria-hidden="true"
                                                ></span>
                                            )}
                                            {allWorking
                                                ? "Reconstructing\u2026"
                                                : "Start reconstruction"}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>
                );
            }

            function FileCard({
                item,
                onRemove,
                onCancel,
                onRetry,
                onDownload,
            }) {
                const statusClass = item.status.toLowerCase();
                const progress =
                    item.status === "Ready" ||
                    item.status === "Failed" ||
                    item.status === "Cancelled"
                        ? 0
                        : item.progress;
                const working =
                    item.status === "Uploading" || item.status === "Processing";

                return (
                    <article
                        className={`file-card ${statusClass}`}
                        style={{ "--progress": `${progress}%` }}
                    >
                        <div className="file-top">
                            <div className="filename" title={item.name}>
                                {item.name}
                            </div>
                            <div className="file-actions">
                                <span className="status" aria-live="polite">
                                    {item.status}
                                </span>
                                {item.status === "Processing" && (
                                    <button
                                        className="mini-action secondary"
                                        type="button"
                                        onClick={() => onCancel(item.id)}
                                    >
                                        Cancel
                                    </button>
                                )}
                                {item.status === "Done" && (
                                    <button
                                        className="mini-action"
                                        type="button"
                                        onClick={() => onDownload(item)}
                                    >
                                        Download
                                    </button>
                                )}
                                {item.status === "Failed" && (
                                    <button
                                        className="mini-action secondary"
                                        type="button"
                                        onClick={() => onRetry(item.id)}
                                    >
                                        Retry
                                    </button>
                                )}
                                {!working && (
                                    <button
                                        className="remove-btn"
                                        type="button"
                                        aria-label={`Remove ${item.name}`}
                                        onClick={() => onRemove(item.id)}
                                    >
                                        &times;
                                    </button>
                                )}
                                {working && item.status !== "Processing" && (
                                    <button
                                        className="remove-btn"
                                        type="button"
                                        aria-label={`Cancel ${item.name}`}
                                        onClick={() => onCancel(item.id)}
                                    >
                                        &times;
                                    </button>
                                )}
                            </div>
                        </div>
                        {item.status === "Failed" && (
                            <div className="error-line">
                                {item.error || ERROR_COPY.network}
                            </div>
                        )}
                        <div
                            className="progress-track"
                            aria-hidden={
                                item.status === "Ready" ||
                                item.status === "Failed" ||
                                item.status === "Cancelled"
                            }
                        >
                            <div className="progress-fill"></div>
                        </div>
                    </article>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
